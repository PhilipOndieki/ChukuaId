name: Chukua ID CI/CD

on:
  push:
    branches: [ main, master ]
    paths:
      - 'client/**'
      - '.github/workflows/Chukua ID-ci-cd.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'client/**'

jobs:
  build:
    name: Build Chukua ID Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: client/package-lock.json

    - name: Install dependencies
      working-directory: ./client
      run: npm install

    - name: Build application
      working-directory: ./client
      run: npm run build
      env:
        # Firebase Configuration
        VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
        VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        # AI Chatbot
        VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        # Payments
        VITE_PAYSTACK_PUBLIC_KEY: ${{ secrets.VITE_PAYSTACK_PUBLIC_KEY }}
        VITE_PAYSTACK_VERIFY_URL: ${{ secrets.VITE_PAYSTACK_VERIFY_URL }}

    - name: Build stats
      working-directory: ./client
      run: |
        echo "Chukua ID Build Statistics:"
        du -sh dist
        ls -lah dist
        echo "Chukua ID frontend build successful!"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Chukua ID-build
        path: client/dist
        retention-days: 7

  deploy:
    name: Deploy to Vercel
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deployment notification
      run: |
        echo "Deploying Chukua ID to Vercel..."
        echo "Project: Chukua ID — Real-time Flood Crisis Response"
        echo "Vercel auto-deploys on push to main branch"
        echo "Deployment URL: https://chukuaid.vercel.app"

    - name: Deployment success
      run: |
        echo "Chukua ID deployment completed!"
        echo "App URL: https://chukuaid.vercel.app"
        echo "Live Map: ACTIVE"
        echo "Incident Reporting: LIVE"
        echo "Shelter Coordination: LIVE"
        echo "Note: Vercel GitHub integration handles automatic deployment"